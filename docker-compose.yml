version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: cabshare-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  server:
    build: ./server
    container_name: cabshare-server
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=production
      - PORT=5000
      - CLIENT_URL=http://localhost:5173
      - MONGO_URI=mongodb://mongo:27017/cabshare
      # Copy the remaining secrets from server/.env.example into a server/.env
      # file (used automatically by docker-compose's env_file below).
    env_file:
      - ./server/.env
    depends_on:
      - mongo

  client:
    build: ./client
    container_name: cabshare-client
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - server

volumes:
  mongo-data:
